<div class="app-layout d-flex">
  <!-- Sidebar -->
  <aside class="sidebar p-3 d-flex flex-column text-white">
    <div class="logo-area mb-4 px-2 d-flex align-items-center gap-2">
      <div class="logo-icon bg-primary rounded d-flex justify-content-center align-items-center">∞</div>
      <h2 class="fs-5 fw-bold mb-0">{{ 'APP_TITLE' | translate }}</h2>
    </div>

    <nav class="nav flex-column gap-2 mb-auto">
      <a class="nav-link text-white rounded px-3 py-2 d-flex align-items-center gap-2" routerLink="/dashboard" routerLinkActive="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span>{{ 'NAV_DASHBOARD' | translate }}</span>
      </a>
      <a class="nav-link text-white rounded px-3 py-2 d-flex align-items-center gap-2" routerLink="/deploy" routerLinkActive="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
        <span>{{ 'NAV_DEPLOY' | translate }}</span>
      </a>
      <a class="nav-link text-white rounded px-3 py-2 d-flex align-items-center gap-2" routerLink="/logs" routerLinkActive="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span>{{ 'NAV_LOGS' | translate }}</span>
      </a>
      <a class="nav-link text-white rounded px-3 py-2 d-flex align-items-center gap-2" routerLink="/services" routerLinkActive="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        <span>{{ 'SETTINGS.TAB_SERVICES' | translate }}</span>
      </a>
      <a class="nav-link text-white rounded px-3 py-2 d-flex align-items-center gap-2" routerLink="/settings" routerLinkActive="active">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span>{{ 'NAV_SETTINGS' | translate }}</span>
      </a>
    </nav>

    <div class="mt-4 border-top border-secondary pt-3">
      <label class="text-secondary small text-uppercase fw-bold mb-2 d-block px-2">Language / בחר שפה</label>
      <select class="form-select form-select-sm bg-dark text-white border-secondary shadow-sm" style="cursor: pointer" (change)="setLanguage($any($event.target).value)" [value]="currentLang">
        <option value="en">🇺🇸 English</option>
        <option value="he">🇮🇱 עברית</option>
      </select>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="main-content flex-grow-1 p-4 overflow-auto">
    <router-outlet></router-outlet>
  </main>

</div>
